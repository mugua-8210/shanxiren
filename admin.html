<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员审核 - 山西名人录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
        }
        .tab-btn.active {
            background: #8b1a1a;
            color: white;
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .status-pending {
            background: #ffc107;
            color: #856404;
        }
        .status-approved {
            background: #28a745;
            color: white;
        }
        .status-rejected {
            background: #dc3545;
            color: white;
        }
        .time-text {
            color: #666;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-approve {
            background: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .btn-reject {
            background: #dc3545;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="index.html">山西名人录</a></h1>
        <p>管理员审核后台</p>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="admin.html">审核</a>
            <a href="#" id="logoutBtn">退出</a>
        </div>
    </div>

    <div class="container">
        <div class="detail-card">
            <h2>待审核补充信息</h2>
            
            <div id="loginArea" style="display: none;">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="输入密码">
                    <button id="loginBtn" class="btn-submit" style="margin-top: 1rem;">登录</button>
                </div>
            </div>

            <div id="adminContent" style="display: none;">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('pending')">待审核</button>
                    <button class="tab-btn" onclick="switchTab('history')">已审核历史</button>
                </div>
                <div id="pendingList"></div>
                <div id="historyList" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ojibgfhavlhsqqnkfcte.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_auyTRPEo0Japh-4ijdS7Dg_hcaFhNeO';
        const ADMIN_PASSWORD = 'shanxi123';

        let supabaseClient;
        let currentTab = 'pending';

        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        function checkLogin() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadPendingContributions();
            } else {
                document.getElementById('loginArea').style.display = 'block';
                document.getElementById('adminContent').style.display = 'none';
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            checkLogin();
        });

        document.getElementById('loginBtn')?.addEventListener('click', () => {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                checkLogin();
            } else {
                alert('密码错误');
            }
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'pending') {
                document.querySelector('.tab-bar button:first-child').classList.add('active');
                document.getElementById('pendingList').style.display = 'block';
                document.getElementById('historyList').style.display = 'none';
                loadPendingContributions();
            } else {
                document.querySelector('.tab-bar button:last-child').classList.add('active');
                document.getElementById('pendingList').style.display = 'none';
                document.getElementById('historyList').style.display = 'block';
                loadHistoryContributions();
            }
        }

        async function loadPendingContributions() {
            const { data: contributions, error } = await supabaseClient
                .from('user_contribution')
                .select('id, person_id, field_name, new_value, created_at')
                .eq('status', 'pending')
                .order('id', { ascending: false });

            if (error) {
                document.getElementById('pendingList').innerHTML = '<div class="loading">加载失败</div>';
                return;
            }

            if (!contributions || contributions.length === 0) {
                document.getElementById('pendingList').innerHTML = '<div class="loading">暂无待审核内容</div>';
                return;
            }

            const personIds = [...new Set(contributions.map(c => c.person_id))];
            const { data: persons } = await supabaseClient
                .from('person')
                .select('id, name')
                .in('id', personIds);

            const personMap = {};
            if (persons) {
                persons.forEach(p => { personMap[p.id] = p.name; });
            }

            const container = document.getElementById('pendingList');
            container.innerHTML = contributions.map(item => `
                <div class="card">
                    <h3>${personMap[item.person_id] || '未知'} - ${item.field_name}</h3>
                    <p><strong>补充内容：</strong>${escapeHtml(item.new_value)}</p>
                    <div class="time-text">提交时间：${formatTime(item.created_at)}</div>
                    <div style="margin-top: 1rem;">
                        <button class="btn-approve" onclick="approve(${item.id}, ${item.person_id}, '${escapeHtml(item.field_name)}', '${escapeHtml(item.new_value)}', '${item.created_at}')">通过</button>
                        <button class="btn-reject" onclick="reject(${item.id})">拒绝</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadHistoryContributions() {
            const { data: contributions, error } = await supabaseClient
                .from('user_contribution')
                .select('id, person_id, field_name, new_value, status, created_at')
                .in('status', ['approved', 'rejected'])
                .order('id', { ascending: false });

            if (error || !contributions || contributions.length === 0) {
                document.getElementById('historyList').innerHTML = '<div class="loading">暂无历史记录</div>';
                return;
            }

            const personIds = [...new Set(contributions.map(c => c.person_id))];
            const { data: persons } = await supabaseClient
                .from('person')
                .select('id, name')
                .in('id', personIds);

            const personMap = {};
            if (persons) {
                persons.forEach(p => { personMap[p.id] = p.name; });
            }

            document.getElementById('historyList').innerHTML = contributions.map(item => `
                <div class="card">
                    <h3>${personMap[item.person_id] || '未知'} - ${item.field_name}</h3>
                    <p><strong>补充内容：</strong>${escapeHtml(item.new_value)}</p>
                    <div class="time-text">提交时间：${formatTime(item.created_at)}</div>
                    <div><span class="status-badge ${item.status === 'approved' ? 'status-approved' : 'status-rejected'}">${item.status === 'approved' ? '已通过' : '已拒绝'}</span></div>
                </div>
            `).join('');
        }

        async function approve(id, personId, fieldName, newValue, createdAt) {
    console.log('开始审核:', { id, personId, fieldName, newValue, createdAt });
    
    try {
        // 先检查这条记录是否已经被审核过
        const { data: checkRecord, error: checkError } = await supabaseClient
            .from('user_contribution')
            .select('status')
            .eq('id', id)
            .single();
        
        if (checkError) {
            console.error('检查状态失败:', checkError);
            alert('检查状态失败: ' + checkError.message);
            return;
        }
        
        if (checkRecord.status !== 'pending') {
            alert('这条记录已经被审核过了！');
            await loadPendingContributions();
            await loadHistoryContributions();
            return;
        }
        
        // 获取当前主要事迹
        const { data: currentPerson, error: fetchError } = await supabaseClient
            .from('person')
            .select('main_achievement')
            .eq('id', personId)
            .single();
        
        if (fetchError) {
            console.error('获取失败:', fetchError);
            alert('获取失败: ' + fetchError.message);
            return;
        }
        
        const currentText = currentPerson?.main_achievement || '';
        const timeStr = formatTime(createdAt);
        
        const newEntry = '\n\n\n📝 【网友补充】\n' + newValue + '\n📅 补充时间：' + timeStr;
        const newMainAchievement = currentText + newEntry;
        
        // 更新 person 表
        const { error: updateError } = await supabaseClient
            .from('person')
            .update({ main_achievement: newMainAchievement })
            .eq('id', personId);
        
        if (updateError) {
            console.error('更新失败:', updateError);
            alert('更新失败: ' + updateError.message);
            return;
        }
        
        // 更新补充表状态为 approved
        const { error: contribError } = await supabaseClient
            .from('user_contribution')
            .update({ status: 'approved' })
            .eq('id', id);
        
        if (contribError) {
            console.error('状态更新失败:', contribError);
            alert('状态更新失败: ' + contribError.message);
            return;
        }
        
        alert('审核通过！');
        
        // 强制刷新两个列表
        await loadPendingContributions();
        await loadHistoryContributions();
        
    } catch (err) {
        console.error('审核出错:', err);
        alert('审核出错: ' + err.message);
    }
}

        async function reject(id) {
            const { error } = await supabaseClient
                .from('user_contribution')
                .update({ status: 'rejected' })
                .eq('id', id);

            if (error) {
                alert('操作失败: ' + error.message);
                return;
            }

            alert('已拒绝');
            await loadPendingContributions();
            await loadHistoryContributions();
        }

        function formatTime(timeStr) {
            if (!timeStr) return '时间未知';
            try {
                const date = new Date(timeStr);
                return date.toLocaleString('zh-CN');
            } catch {
                return timeStr;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        initSupabase();
        checkLogin();
    </script>
</body>
</html>
