<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员审核 - 山西名人录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #8b1a1a;
            color: white;
        }
        .tab-btn:not(.active):hover {
            background: #f0f0f0;
        }
        .batch-actions {
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .batch-actions button {
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .batch-actions button:hover {
            background: #5a6268;
        }
        .card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 1rem;
            cursor: pointer;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .status-pending {
            background: #ffc107;
            color: #856404;
        }
        .status-approved {
            background: #28a745;
            color: white;
        }
        .status-rejected {
            background: #dc3545;
            color: white;
        }
        .time-text {
            color: #666;
            font-size: 0.8rem;
            margin: 0.5rem 0;
        }
        .contributor-text {
            color: #888;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="index.html">🏔️ 山西名人录</a></h1>
        <p>管理员审核后台</p>
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="admin.html">🔐 审核</a>
            <a href="#" id="logoutBtn">🚪 退出</a>
        </div>
    </div>

    <div class="container">
        <div class="detail-card">
            <h2>📋 审核管理</h2>
            
            <div id="loginArea" style="display: none;">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="输入密码">
                    <button id="loginBtn" class="btn-submit" style="margin-top: 1rem;">登录</button>
                </div>
            </div>

            <div id="adminContent" style="display: none;">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('pending')">⏳ 待审核</button>
                    <button class="tab-btn" onclick="switchTab('history')">📜 已审核历史</button>
                </div>

                <div id="pendingArea">
                    <div class="batch-actions" id="batchActions" style="display: none;">
                        <span>批量操作：</span>
                        <button onclick="batchApprove()">✅ 批量通过</button>
                        <button onclick="batchReject()">❌ 批量拒绝</button>
                        <button onclick="toggleSelectAll()" id="selectAllBtn">☑️ 全选</button>
                    </div>
                    <div id="pendingList"></div>
                </div>

                <div id="historyArea" style="display: none;">
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ojibgfhavlhsqqnkfcte.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_auyTRPEo0Japh-4ijdS7Dg_hcaFhNeO';
        const ADMIN_PASSWORD = 'shanxi123';

        let supabaseClient;
        let currentTab = 'pending';
        let selectedIds = new Set();

        async function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        function checkLogin() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadCurrentTab();
            } else {
                document.getElementById('loginArea').style.display = 'block';
                document.getElementById('adminContent').style.display = 'none';
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            checkLogin();
        });

        document.getElementById('loginBtn')?.addEventListener('click', () => {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                checkLogin();
            } else {
                alert('密码错误');
            }
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tab === 'pending') {
                document.querySelector('.tab-bar button:first-child').classList.add('active');
                document.getElementById('pendingArea').style.display = 'block';
                document.getElementById('historyArea').style.display = 'none';
                loadPendingContributions();
            } else {
                document.querySelector('.tab-bar button:last-child').classList.add('active');
                document.getElementById('pendingArea').style.display = 'none';
                document.getElementById('historyArea').style.display = 'block';
                loadHistoryContributions();
            }
        }

        function loadCurrentTab() {
            if (currentTab === 'pending') {
                loadPendingContributions();
            } else {
                loadHistoryContributions();
            }
        }

        async function loadPendingContributions() {
            const { data: contributions, error: contribError } = await supabaseClient
                .from('user_contribution')
                .select('id, person_id, field_name, new_value, status, created_at')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            if (contribError) {
                console.error('查询失败:', contribError);
                document.getElementById('pendingList').innerHTML = '<div class="loading">加载失败: ' + contribError.message + '</div>';
                return;
            }

            if (!contributions || contributions.length === 0) {
                document.getElementById('pendingList').innerHTML = '<div class="loading">暂无待审核内容</div>';
                document.getElementById('batchActions').style.display = 'none';
                return;
            }

            document.getElementById('batchActions').style.display = 'flex';
            
            const personIds = [...new Set(contributions.map(c => c.person_id))];
            const { data: persons, error: personError } = await supabaseClient
                .from('person')
                .select('id, name')
                .in('id', personIds);

            const personMap = {};
            if (persons) {
                persons.forEach(p => { personMap[p.id] = p.name; });
            }

            const container = document.getElementById('pendingList');
            container.innerHTML = contributions.map(item => `
                <div class="card" style="margin-bottom: 1rem;">
                    <div class="card-header">
                        <div class="card-header-left">
                            <input type="checkbox" class="item-checkbox" data-id="${item.id}" onchange="toggleSelect(${item.id})">
                            <h3 style="margin: 0;">${personMap[item.person_id] || '未知'} - ${item.field_name}</h3>
                            <span class="status-badge status-pending">待审核</span>
                        </div>
                    </div>
                    <p style="margin: 0.5rem 0;"><strong>补充内容：</strong>${escapeHtml(item.new_value)}</p>
                    <div class="time-text">📅 提交时间：${formatTime(item.created_at)}</div>
                    <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                        <button onclick="approve(${item.id}, ${item.person_id}, '${item.field_name}', '${escapeHtml(item.new_value)}', '${formatTime(item.created_at)}')" style="background: #28a745; color: white; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer;">✅ 通过</button>
                        <button onclick="reject(${item.id})" style="background: #dc3545; color: white; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer;">❌ 拒绝</button>
                    </div>
                </div>
            `).join('');
            
            selectedIds.clear();
            updateSelectAllButton();
        }

        async function loadHistoryContributions() {
            const { data: contributions, error: contribError } = await supabaseClient
                .from('user_contribution')
                .select('id, person_id, field_name, new_value, status, created_at')
                .in('status', ['approved', 'rejected'])
                .order('created_at', { ascending: false });

            if (contribError) {
                console.error('查询失败:', contribError);
                document.getElementById('historyList').innerHTML = '<div class="loading">加载失败: ' + contribError.message + '</div>';
                return;
            }

            if (!contributions || contributions.length === 0) {
                document.getElementById('historyList').innerHTML = '<div class="loading">暂无历史记录</div>';
                return;
            }

            const personIds = [...new Set(contributions.map(c => c.person_id))];
            const { data: persons, error: personError } = await supabaseClient
                .from('person')
                .select('id, name')
                .in('id', personIds);

            const personMap = {};
            if (persons) {
                persons.forEach(p => { personMap[p.id] = p.name; });
            }

            const container = document.getElementById('historyList');
            container.innerHTML = contributions.map(item => `
                <div class="card" style="margin-bottom: 1rem;">
                    <div class="card-header">
                        <div class="card-header-left">
                            <h3 style="margin: 0;">${personMap[item.person_id] || '未知'} - ${item.field_name}</h3>
                            <span class="status-badge ${item.status === 'approved' ? 'status-approved' : 'status-rejected'}">${item.status === 'approved' ? '已通过' : '已拒绝'}</span>
                        </div>
                    </div>
                    <p style="margin: 0.5rem 0;"><strong>补充内容：</strong>${escapeHtml(item.new_value)}</p>
                    <div class="time-text">📅 提交时间：${formatTime(item.created_at)}</div>
                </div>
            `).join('');
        }

        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateSelectAllButton();
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.item-checkbox');
            if (checkboxes.length === 0) return;
            
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            
            checkboxes.forEach(cb => {
                cb.checked = !allChecked;
                const id = parseInt(cb.dataset.id);
                if (!allChecked) {
                    selectedIds.add(id);
                } else {
                    selectedIds.delete(id);
                }
            });
            
            updateSelectAllButton();
        }

        function updateSelectAllButton() {
            const btn = document.getElementById('selectAllBtn');
            const checkboxes = document.querySelectorAll('.item-checkbox');
            if (checkboxes.length === 0) return;
            
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            btn.textContent = allChecked ? '⬜ 取消全选' : '☑️ 全选';
        }

        async function batchApprove() {
            if (selectedIds.size === 0) {
                alert('请先选择要审核的项');
                return;
            }
            
            if (!confirm(`确定要通过 ${selectedIds.size} 条补充信息吗？`)) return;
            
            for (const id of selectedIds) {
                const item = await getContributionById(id);
                if (item) {
                    await approve(id, item.person_id, item.field_name, item.new_value, item.created_at, true);
                }
            }
            
            selectedIds.clear();
            await loadPendingContributions();
            alert(`已通过 ${selectedIds.size} 条补充信息`);
        }

        async function batchReject() {
            if (selectedIds.size === 0) {
                alert('请先选择要审核的项');
                return;
            }
            
            if (!confirm(`确定要拒绝 ${selectedIds.size} 条补充信息吗？`)) return;
            
            for (const id of selectedIds) {
                await reject(id, true);
            }
            
            selectedIds.clear();
            await loadPendingContributions();
            alert(`已拒绝 ${selectedIds.size} 条补充信息`);
        }

        async function getContributionById(id) {
            const { data, error } = await supabaseClient
                .from('user_contribution')
                .select('person_id, field_name, new_value, created_at')
                .eq('id', id)
                .single();
            
            if (error) return null;
            return data;
        }

        async function approve(id, personId, fieldName, newValue, createdAt, isBatch = false) {
            let updateData = {};
            
            if (fieldName === '事迹') {
                const { data: currentPerson } = await supabaseClient
                    .from('person')
                    .select('main_achievement')
                    .eq('id', personId)
                    .single();
                
                const currentText = currentPerson?.main_achievement || '';
                const timeStr = formatTime(createdAt);
                // 追加新内容，带时间标记
                updateData = { 
                    main_achievement: currentText + '\n\n📝 【网友补充】' + newValue + '\n   └─ 补充时间：' + timeStr
                };
            } else {
                updateData = { extra_info: newValue };
            }

            const { error: updateError } = await supabaseClient
                .from('person')
                .update(updateData)
                .eq('id', personId);

            if (updateError && !isBatch) {
                alert('更新失败: ' + updateError.message);
                return false;
            }

            const { error: contribError } = await supabaseClient
                .from('user_contribution')
                .update({ status: 'approved' })
                .eq('id', id);

            if (contribError && !isBatch) {
                alert('状态更新失败: ' + contribError.message);
                return false;
            }

            if (!isBatch) {
                alert('审核通过！');
                await loadPendingContributions();  // 刷新待审核列表
                await loadHistoryContributions();  // 同时刷新历史列表
            }
            return true;
        }

        async function reject(id, isBatch = false) {
            const { error } = await supabaseClient
                .from('user_contribution')
                .update({ status: 'rejected' })
                .eq('id', id);

            if (error && !isBatch) {
                alert('操作失败: ' + error.message);
                return false;
            }

            if (!isBatch) {
                alert('已拒绝');
                await loadPendingContributions();  // 刷新待审核列表
                await loadHistoryContributions();  // 同时刷新历史列表
            }
            return true;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '时间未知';
            try {
                const date = new Date(timeStr);
                return date.toLocaleString('zh-CN');
            } catch {
                return timeStr;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        initSupabase();
        checkLogin();
    </script>
</body>
</html>
