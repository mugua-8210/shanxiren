<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加山西名人 - 山西名人录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="header">
        <h1><a href="index.html">🏔️ 山西名人录</a></h1>
        <p>让世界看见山西 · 三晋儿女的骄傲</p>
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="add.html">➕ 添加名人</a>
        </div>
    </div>

    <div class="container">
        <div class="detail-card">
            <h2>📝 添加山西名人</h2>
            <p style="color: #666; margin-bottom: 1.5rem;">填写下方信息，AI 将自动为您生成详细介绍</p>

            <form id="addPersonForm">
                <div class="form-group">
                    <label>* 姓名</label>
                    <input type="text" id="name" required placeholder="例如：狄仁杰">
                </div>

                <div class="form-group">
                    <label>朝代</label>
                    <input type="text" id="dynasty" placeholder="例如：唐朝、宋朝、明朝">
                </div>

                <div class="form-group">
                    <label>* 所属市</label>
                    <select id="city" required>
                        <option value="">请选择所属市</option>
                        <option value="太原市">太原市</option>
                        <option value="运城市">运城市</option>
                        <option value="临汾市">临汾市</option>
                        <option value="大同市">大同市</option>
                        <option value="长治市">长治市</option>
                        <option value="晋城市">晋城市</option>
                        <option value="忻州市">忻州市</option>
                        <option value="晋中市">晋中市</option>
                        <option value="吕梁市">吕梁市</option>
                        <option value="阳泉市">阳泉市</option>
                        <option value="朔州市">朔州市</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>* 县/区</label>
                    <select id="county" required disabled>
                        <option value="">请先选择所属市</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>出生年份（公元）</label>
                    <input type="number" id="birth_year" placeholder="例如：630">
                </div>

                <div class="form-group">
                    <label>逝世年份（公元）</label>
                    <input type="number" id="death_year" placeholder="例如：700">
                </div>

                <div class="form-group">
                    <label>主要事迹</label>
                    <textarea id="main_achievement" placeholder="简要介绍这位名人的主要成就..."></textarea>
                </div>

                <button type="submit" class="btn-submit">✨ 提交并生成 AI 介绍</button>
            </form>
        </div>
    </div>

    <script>
        // 市 → 县/区 完整映射表
        const cityCountiesMap = {
            "太原市": ["小店区", "迎泽区", "杏花岭区", "尖草坪区", "万柏林区", "晋源区", "清徐县", "阳曲县", "娄烦县", "古交市"],
            "运城市": ["盐湖区", "永济市", "河津市", "芮城县", "临猗县", "万荣县", "新绛县", "稷山县", "闻喜县", "夏县", "绛县", "平陆县", "垣曲县"],
            "临汾市": ["尧都区", "侯马市", "霍州市", "曲沃县", "翼城县", "襄汾县", "洪洞县", "古县", "安泽县", "浮山县", "吉县", "乡宁县", "大宁县", "隰县", "永和县", "蒲县", "汾西县"],
            "大同市": ["平城区", "云冈区", "新荣区", "云州区", "阳高县", "天镇县", "广灵县", "灵丘县", "浑源县", "左云县"],
            "长治市": ["潞州区", "上党区", "屯留区", "潞城区", "襄垣县", "平顺县", "黎城县", "壶关县", "长子县", "武乡县", "沁县", "沁源县"],
            "晋城市": ["城区", "高平市", "泽州县", "沁水县", "阳城县", "陵川县"],
            "忻州市": ["忻府区", "原平市", "定襄县", "五台县", "代县", "繁峙县", "宁武县", "静乐县", "神池县", "五寨县", "岢岚县", "河曲县", "保德县", "偏关县"],
            "晋中市": ["榆次区", "太谷区", "介休市", "榆社县", "左权县", "和顺县", "昔阳县", "寿阳县", "祁县", "平遥县", "灵石县"],
            "吕梁市": ["离石区", "孝义市", "汾阳市", "文水县", "交城县", "兴县", "临县", "柳林县", "石楼县", "岚县", "方山县", "中阳县", "交口县"],
            "阳泉市": ["城区", "矿区", "郊区", "平定县", "盂县"],
            "朔州市": ["朔城区", "平鲁区", "怀仁市", "山阴县", "应县", "右玉县"]
        };

        const citySelect = document.getElementById('city');
        const countySelect = document.getElementById('county');

        // 市选择变化时，更新县/区下拉框
        citySelect.addEventListener('change', function() {
            const selectedCity = this.value;
            const counties = cityCountiesMap[selectedCity] || [];
            
            // 清空并启用 county 下拉框
            countySelect.innerHTML = '<option value="">请选择县/区</option>';
            
            if (counties.length > 0) {
                countySelect.disabled = false;
                counties.forEach(county => {
                    const option = document.createElement('option');
                    option.value = county;
                    option.textContent = county;
                    countySelect.appendChild(option);
                });
            } else {
                countySelect.disabled = true;
            }
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
