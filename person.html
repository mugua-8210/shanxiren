<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名人详情 - 山西名人录</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="header">
        <h1><a href="index.html">🏔️ 山西名人录</a></h1>
        <p>让世界看见山西 · 三晋儿女的骄傲</p>
        <div class="nav-links">
            <a href="index.html">🏠 首页</a>
            <a href="add.html">➕ 添加名人</a>
        </div>
    </div>

    <div class="container">
        <!-- 详情内容会动态加载到这里 -->
        <div id="detailContent">
            <div class="loading">加载中...</div>
        </div>

        <!-- 网友补充信息 -->
        <div class="detail-card">
            <h3>📝 补充信息</h3>
            <p style="color: #666; margin-bottom: 1rem;">如果您知道更多关于这位名人的信息，欢迎补充！</p>
            
            <form id="contributeForm">
                <div class="form-group">
                    <label>信息类别</label>
                    <select id="fieldName">
                        <option value="事迹">事迹补充</option>
                        <option value="家族">家族信息</option>
                        <option value="著作">著作/作品</option>
                        <option value="传说">民间传说</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>补充内容</label>
                    <textarea id="newValue" rows="4" placeholder="请详细描述您知道的信息..."></textarea>
                </div>

                <button type="submit" class="btn-submit">📤 提交补充</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
